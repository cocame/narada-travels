name: Update Analytics Stats

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Yandex.Metrika data
        env:
          YM_TOKEN: ${{ secrets.YM_TOKEN }}
        run: python stats/fetch_analytics.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/data.json
          if git diff --cached --quiet; then
            echo "No changes – skipping commit"
          else
            git commit -m "chore: update analytics stats $(date -u +'%Y-%m-%d')"
            git push
          fi
