name: Update Stats

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Yandex.Metrika stats
        env:
          YM_TOKEN: ${{ secrets.YM_TOKEN }}
        run: python3 stats/fetch_metrika.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/data.json
          git diff --cached --quiet || git commit -m "stats: auto-update $(date -u +%Y-%m-%d)"
          git push
